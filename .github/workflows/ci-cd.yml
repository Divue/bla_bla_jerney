# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline
# ==============================================================
# Triggers on every push and pull request.
# Stages:
# Lint → Dependency Audit → Build → Image Scan → IaC Scan → Dockerfile Lint → Manifest Update
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-frontend

jobs:

# ==============================================================
# STAGE 1: Lint
# ==============================================================

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint


# ==============================================================
# STAGE 2: Dependency Audit (SCA)
# ==============================================================

  sca:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true


# ==============================================================
# STAGE 3: Build & Push Container Images
# ==============================================================

  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: sca

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true


# ==============================================================
# STAGE 4: Container Image Scanning (Trivy)
# ==============================================================

  image-scan:
    name: Scan ${{ matrix.component }} Image
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          timeout: 10m


# ==============================================================
# STAGE 5: IaC Security Scan (Checkov)
# ==============================================================

  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Scan Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true
          skip_check: CKV_AWS_39,CKV_AWS_58,CKV_TF_1,CKV_AWS_38,CKV_AWS_339,CKV_AWS_338,CKV_AWS_356,CKV_AWS_111,CKV2_AWS_19,CKV2_AWS_5,CKV2_AWS_12
          download_external_modules: true

      - name: Scan Kubernetes
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true


# ==============================================================
# STAGE 6: Dockerfile Lint
# ==============================================================

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: warning


# ==============================================================
# STAGE 7: Update Kubernetes Manifest
# ==============================================================

  update-manifest:
    name: Update K8s Manifest
    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    needs:
      - build
      - image-scan

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update image tags
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}

          BACKEND_LINE=$(awk '/- name: backend/{found=1} found && /image:/{print NR; exit}' k8s/jerney.yaml)
          sed -i "${BACKEND_LINE}s|.*|          image: ${BACKEND_IMAGE}:${IMAGE_TAG}|" k8s/jerney.yaml

          FRONTEND_LINE=$(awk '/- name: frontend/{found=1} found && /image:/{print NR; exit}' k8s/jerney.yaml)
          sed -i "${FRONTEND_LINE}s|.*|          image: ${FRONTEND_IMAGE}:${IMAGE_TAG}|" k8s/jerney.yaml

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/jerney.yaml

          git diff --cached --quiet || \
          git commit -m "ci: update k8s images to ${{ steps.sha.outputs.short }} [skip ci]"

          git push